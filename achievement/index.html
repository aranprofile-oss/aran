<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <title>노아란 — 업적 💛</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  <style>
    @font-face {
      font-family: 'GmarketSans';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansBold.woff') format('woff');
      font-weight: 700; font-style: normal;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --gold:#ffd26c; --gold-light:#fff0c0; --gold-pale:#fffbf0;
      --brown:#9b745a; --brown-dark:#6b4e3a;
      --bg:#fdf8f0; --white:#fff;
      --text:#1a1410; --text-muted:#7a6a5a;
      --border:rgba(155,116,90,.15);
    }
    html,body{width:100%;min-height:100vh;background:var(--bg);font-family:'Pretendard',sans-serif;font-weight:300;color:var(--text)}
    ::-webkit-scrollbar{width:6px} ::-webkit-scrollbar-track{background:var(--bg)} ::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px}

    nav{position:sticky;top:0;z-index:50;background:rgba(253,248,240,.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--border)}
    .nav-inner{max-width:900px;margin:0 auto;display:flex;justify-content:center;overflow-x:auto}
    .nav-tab{position:relative;padding:12px 20px;font-size:.875rem;font-weight:400;color:var(--text-muted);text-decoration:none;transition:color .25s;white-space:nowrap;font-family:'Pretendard',sans-serif}
    .nav-tab::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:0;height:2px;background:var(--gold);border-radius:1px;transition:width .3s}
    .nav-tab:hover{color:var(--brown-dark)} .nav-tab:hover::after{width:60%}
    .nav-tab.active{color:var(--brown-dark)} .nav-tab.active::after{width:100%}

    .page{max-width:860px;margin:0 auto;padding:40px 24px 80px}

    .page-title{font-family:'GmarketSans',sans-serif;font-size:36px;font-weight:700;margin-bottom:6px}
    .page-sub{font-size:14px;color:var(--text-muted);margin-bottom:24px;font-weight:300}

    /* 연도 탭 */
    .year-tabs{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
    .year-tab{padding:7px 20px;border-radius:10px;font-size:14px;font-weight:500;border:1.5px solid var(--border);cursor:pointer;transition:all .2s;background:var(--white);color:var(--text-muted);font-family:'Pretendard',sans-serif}
    .year-tab:hover{border-color:var(--brown);color:var(--brown-dark)}
    .year-tab.active{background:var(--brown-dark);color:#fff;border-color:var(--brown-dark)}

    /* 카테고리 하이라이트 선택 */
    .cat-filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:32px}
    .cat-btn{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:500;border:1.5px solid transparent;cursor:pointer;transition:all .2s;background:var(--white);color:var(--text-muted);border-color:var(--border);font-family:'Pretendard',sans-serif}
    .cat-btn:hover{border-color:var(--brown);color:var(--brown-dark)}
    .cat-btn.active{color:#fff;border-color:transparent}
    .cat-btn.none-active{background:var(--brown-dark);color:#fff;border-color:var(--brown-dark)}

    /* 연도 섹션 */
    .year-section{margin-bottom:40px}
    .year-section.hidden{display:none}
    .year-label{font-family:'GmarketSans',sans-serif;font-size:20px;font-weight:700;color:var(--brown-dark);margin-bottom:16px;padding-bottom:10px;border-bottom:1.5px solid var(--border)}

    /* 업적 아이템 */
    .ach-item{display:flex;gap:16px;padding:11px 0;border-bottom:1px solid rgba(155,116,90,.07);transition:opacity .25s}
    .ach-item:last-child{border-bottom:none}
    .ach-item.dimmed{opacity:1}
    .ach-dot{width:8px;height:8px;border-radius:3px;flex-shrink:0;margin-top:5px}
    .ach-date{flex-shrink:0;width:76px;font-size:13px;color:var(--text-muted);font-weight:400;white-space:nowrap}
    .ach-content{font-size:15px;line-height:1.7;font-weight:300}
    .ach-highlight{border-radius:3px;padding:1px 3px;background:transparent;transition:background .25s}
    .ach-highlight.lit{background:var(--hl-color,rgba(230,184,74,.3))}

    .empty{text-align:center;padding:48px 0;color:var(--text-muted);font-size:14px}
    footer p{margin-bottom:4px}
    footer{text-align:center;font-size:11px;color:var(--text-muted);letter-spacing:.08em;padding:24px 0 32px;border-top:1px solid var(--border)}
    @keyframes fadeInUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .fade-in{animation:fadeInUp .4s ease both}
    @media(max-width:640px){
      .page-title{font-size:26px}
      .ach-date{width:56px;font-size:12px}
      .ach-content{font-size:14px}
    }
  </style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <a href="/" class="nav-tab">프로필</a>
    <a href="/achievement/" class="nav-tab active">업적</a>
    <a href="/schedule/" class="nav-tab">일정</a>
    <a href="https://meloming.com/channel/aarann_/musicbook" target="_blank" class="nav-tab">노래책</a>
  </div>
</nav>

<main class="page">
  <div class="fade-in">
    <div class="page-title">노아란의 업적 🏆</div>
    <div class="page-sub">활동 기록 · 노래대회 · 이벤트 참여</div>
  </div>

  <!-- 연도 탭 -->
  <div class="year-tabs fade-in" id="yearTabs"></div>

  <!-- 카테고리 하이라이트 선택 -->
  <div class="cat-filters fade-in" id="catFilters">
    <button class="cat-btn none-active" data-cat="none" onclick="selectCat('none',this)">하이라이트 없음</button>
  </div>

  <div id="achBody"></div>
</main>

<footer>
  <p>© 2026 노아란 💛</p>
  <p>Designed &amp; Developed by 아키텍트 크리에이티브 · profile@soop.info</p>
</footer>

<script src="../js/supabase-config.js"></script>
<script>
  const sb = initSupabase();
  let categories = [];
  let achievements = [];
  let activeYear = 'all';
  let activeCat = 'none';

  function hexToRgba(hex, a) {
    const h = hex.replace('#','');
    const r=parseInt(h.slice(0,2),16), g=parseInt(h.slice(2,4),16), b=parseInt(h.slice(4,6),16);
    return 'rgba('+r+','+g+','+b+','+a+')';
  }

  async function load() {
    const [r1, r2] = await Promise.all([
      sb.from('achievement_categories').select('*').order('sort_order'),
      sb.from('achievements').select('*, achievement_categories(name,color)').order('year',{ascending:false}).order('sort_order').order('date_label')
    ]);
    categories = r1.data || [];
    achievements = r2.data || [];
    renderYearTabs();
    renderCatFilters();
    renderAchievements();
  }

  function renderYearTabs() {
    const years = [...new Set(achievements.map(a=>a.year).filter(Boolean))].sort((a,b)=>b-a);
    const wrap = document.getElementById('yearTabs');
    wrap.innerHTML = '';
    years.forEach(function(y, i) {
      const btn = document.createElement('button');
      btn.className = 'year-tab' + (i===0?' active':'');
      btn.dataset.year = y;
      btn.textContent = y+'년';
      btn.onclick = function(){ selectYear(String(y), btn); };
      wrap.appendChild(btn);
    });
    // 전체 탭
    const allBtn = document.createElement('button');
    allBtn.className = 'year-tab';
    allBtn.dataset.year = 'all';
    allBtn.textContent = '전체';
    allBtn.onclick = function(){ selectYear('all', allBtn); };
    wrap.appendChild(allBtn);
    // 첫 연도 기본 선택
    if (years.length) activeYear = String(years[0]);
  }

  function selectYear(year, el) {
    activeYear = year;
    document.querySelectorAll('.year-tab').forEach(function(b){ b.classList.remove('active'); });
    el.classList.add('active');
    applyYearFilter();
  }

  function applyYearFilter() {
    document.querySelectorAll('.year-section').forEach(function(sec) {
      if (activeYear === 'all' || sec.dataset.year === activeYear) {
        sec.classList.remove('hidden');
      } else {
        sec.classList.add('hidden');
      }
    });
  }

  function renderCatFilters() {
    const wrap = document.getElementById('catFilters');
    categories.forEach(function(cat) {
      const btn = document.createElement('button');
      btn.className = 'cat-btn';
      btn.dataset.cat = cat.id;
      btn.textContent = cat.name;
      btn.style.cssText = 'border-color:'+cat.color+'50;color:'+cat.color;
      btn.onclick = function(){ selectCat(cat.id, btn); };
      wrap.appendChild(btn);
    });
  }

  function selectCat(catId, el) {
    activeCat = catId;
    document.querySelectorAll('.cat-btn').forEach(function(b) {
      b.classList.remove('active','none-active');
      const cat = categories.find(function(x){ return x.id===b.dataset.cat; });
      if (cat) b.style.cssText = 'border-color:'+cat.color+'50;color:'+cat.color;
      else { b.style.cssText=''; b.classList.add('none-active'); }
    });
    el.classList.add('active');
    if (catId !== 'none') {
      const cat = categories.find(function(x){ return x.id===catId; });
      if (cat) el.style.cssText = 'background:'+cat.color+';color:#fff;border-color:'+cat.color;
    } else {
      el.classList.remove('active');
      el.classList.add('none-active');
    }
    applyHighlight();
  }

  function renderAchievements() {
    const body = document.getElementById('achBody');
    if (!achievements.length) { body.innerHTML = '<div class="empty">등록된 업적이 없습니다</div>'; return; }

    const byYear = {};
    achievements.forEach(function(a) {
      const y = a.year || '기타';
      if (!byYear[y]) byYear[y] = [];
      byYear[y].push(a);
    });

    const years = Object.keys(byYear).sort(function(a,b){ return b-a; });
    body.innerHTML = years.map(function(year) {
      const items = byYear[year].map(function(a) {
        const cat = a.achievement_categories;
        const color = (cat&&cat.color)?cat.color:'#E6B84A';
        return '<div class="ach-item" data-cat="'+(a.category_id||'')+'">'+
          '<div class="ach-dot" style="background:'+color+'"></div>'+
          '<div class="ach-date">'+(a.date_label||'')+'</div>'+
          '<div class="ach-content"><span class="ach-highlight" data-cat="'+(a.category_id||'')+'" data-color="'+color+'">'+a.content+'</span></div>'+
          '</div>';
      }).join('');
      return '<div class="year-section fade-in" data-year="'+year+'"><div class="year-label">'+year+'년</div>'+items+'</div>';
    }).join('');

    applyYearFilter();
    applyHighlight();
  }

  function applyHighlight() {
    document.querySelectorAll('.ach-item').forEach(function(item) {
      const hl = item.querySelector('.ach-highlight');
      if (!hl) return;
      const color = hl.dataset.color || '#E6B84A';
      const catId = hl.dataset.cat;
      if (activeCat === 'none') {
        hl.classList.remove('lit');
        hl.style.removeProperty('--hl-color');
        item.classList.remove('dimmed');
      } else {
        if (catId === activeCat) {
          hl.classList.add('lit');
          hl.style.setProperty('--hl-color', hexToRgba(color, 0.42));
          item.classList.remove('dimmed');
        } else {
          hl.classList.remove('lit');
          hl.style.removeProperty('--hl-color');
          item.classList.add('dimmed');
        }
      }
    });
  }

  load();
</script>
</body>
</html>
