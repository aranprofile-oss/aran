<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <title>노아란 — 노래책 💛</title>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --gold:#ffd26c; --gold-light:#fff0c0; --gold-pale:#fffbf0;
      --brown:#9b745a; --brown-dark:#6b4e3a;
      --soop:#00b4d8;
      --bg:#fdf8f0; --white:#fff;
      --text:#1a1410; --text-muted:#7a6a5a;
      --border:rgba(155,116,90,.15);
    }
    html,body{width:100%;min-height:100vh;background:var(--bg);font-family:'Noto Sans KR',sans-serif;color:var(--text)}
    ::-webkit-scrollbar{width:6px} ::-webkit-scrollbar-track{background:var(--bg)} ::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px}

    nav{position:sticky;top:0;z-index:50;background:rgba(253,248,240,.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--border)}
    .nav-inner{max-width:900px;margin:0 auto;display:flex;justify-content:center}
    .nav-tab{position:relative;padding:12px 24px;font-size:.875rem;font-weight:500;color:var(--text-muted);text-decoration:none;transition:color .25s}
    .nav-tab::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:0;height:2px;background:var(--gold);border-radius:1px;transition:width .3s}
    .nav-tab:hover{color:var(--brown-dark)} .nav-tab:hover::after{width:60%}
    .nav-tab.active{color:var(--brown-dark)} .nav-tab.active::after{width:100%}

    .page{max-width:900px;margin:0 auto;padding:64px 24px 80px;text-align:center}

    .icon-wrap{width:96px;height:96px;border-radius:50%;background:var(--gold-light);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:42px;margin:0 auto 28px}
    .page-title{font-family:'Gowun Batang',serif;font-size:36px;font-weight:700;margin-bottom:8px}
    .page-sub{font-size:15px;color:var(--text-muted);margin-bottom:40px;line-height:1.7}

    .cards{display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:560px;margin:0 auto 40px}
    .card{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:24px;text-align:left;cursor:pointer;transition:transform .2s,box-shadow .2s;text-decoration:none;color:inherit;display:block}
    .card:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(155,116,90,.15)}
    .card-icon{font-size:28px;margin-bottom:10px}
    .card-title{font-size:15px;font-weight:700;margin-bottom:4px}
    .card-desc{font-size:12px;color:var(--text-muted);line-height:1.5}
    .card.primary{background:var(--gold);border-color:var(--gold)}
    .card.primary .card-desc{color:var(--brown-dark)}

    .meloming-btn{
      display:inline-flex;align-items:center;gap:10px;
      padding:14px 32px;border-radius:14px;
      background:var(--gold);color:var(--brown-dark);
      font-size:15px;font-weight:700;
      border:none;cursor:pointer;
      transition:transform .15s,box-shadow .15s;
      text-decoration:none;
    }
    .meloming-btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(255,210,108,.5)}

    .notice{font-size:12px;color:var(--text-muted);margin-top:16px;line-height:1.7}

    /* MODAL */
    .modal-backdrop{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
    .modal-backdrop.open{display:flex}
    .modal{background:var(--bg);border-radius:20px;width:90%;max-width:680px;height:80vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.2)}
    .modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
    .modal-title{font-size:15px;font-weight:700}
    .modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-muted);line-height:1;padding:4px 8px;border-radius:8px;transition:background .2s}
    .modal-close:hover{background:var(--gold-light)}
    .modal-iframe{flex:1;border:none;width:100%}

    footer p{margin-bottom:4px}
    footer{font-size:11px;color:var(--text-muted);letter-spacing:.08em;padding:24px;border-top:1px solid var(--border)}

    @media(max-width:640px){
      .cards{grid-template-columns:1fr}
      .modal{height:90vh}
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="/" class="nav-tab">프로필</a>
    <a href="/schedule/" class="nav-tab">일정</a>
    <a href="/song/" class="nav-tab active">노래책</a>
  </div>
</nav>

<main class="page">
  <div class="icon-wrap">🎵</div>
  <div class="page-title">노아란의 노래책</div>
  <div class="page-sub">노래 신청은 멜로밍에서 받고 있어요.<br>아래 버튼을 눌러 노래 목록을 확인하고 신청해보세요 💛</div>

  <div style="margin-bottom:32px">
    <button class="meloming-btn" onclick="openMeloming()">
      🎤 &nbsp;멜로밍에서 신청하기
    </button>
    <div class="notice">신청 · 목록 확인은 멜로밍 페이지에서 진행됩니다</div>
  </div>

  <div class="cards">
    <div class="card primary" onclick="openMeloming()">
      <div class="card-icon">🎶</div>
      <div class="card-title">노래 목록 보기</div>
      <div class="card-desc">K-발라드 중심의 전체 노래 목록을 확인해요</div>
    </div>
    <div class="card" onclick="openMeloming()">
      <div class="card-icon">📝</div>
      <div class="card-title">노래 신청하기</div>
      <div class="card-desc">방송 중 불러줬으면 하는 노래를 신청해보세요</div>
    </div>
  </div>
</main>

<footer>
  <p>© 2026 노아란 💛</p>
  <p>Designed &amp; Developed by 아키텍트 크리에이티브 · profile@soop.info</p>
</footer>

<!-- MELOMING MODAL -->
<div id="meloModal" class="modal-backdrop" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">🎵 노아란 노래책 — 멜로밍</span>
      <button class="modal-close" onclick="closeModalBtn()">✕</button>
    </div>
    <iframe id="meloFrame" class="modal-iframe" src="" title="멜로밍 노래책"></iframe>
  </div>
</div>

<script>
  function openMeloming() {
    document.getElementById('meloFrame').src = 'https://meloming.com/channel/aarann_/musicbook';
    document.getElementById('meloModal').classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeModalBtn() {
    document.getElementById('meloModal').classList.remove('open');
    document.getElementById('meloFrame').src = '';
    document.body.style.overflow = '';
  }
  function closeModal(e) {
    if (e.target === e.currentTarget) closeModalBtn();
  }
</script>
</body>
</html>
